<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://use.typekit.net/xae2ulr.css">

<title>Traffic Light</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: "video", serif;
  }

  #screen {
    position: fixed;
    inset: 0;
    transition: background 0.6s linear;
  }

  /* Flashing (used for yellow only now) */
  .flash {
    animation: flash 0.8s ease-in-out infinite;
  }

  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* WAIT text */
  #wait {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    color: white;
    opacity: 0;
    pointer-events: none;
  }

  .show {
    animation: pop 0.8s ease-out forwards;
  }

  @keyframes pop {
    0% {
      opacity: 0;
      transform: scale(0.7);
    }
    30% {
      opacity: 1;
      transform: scale(1.1);
    }
    100% {
      opacity: 0;
      transform: scale(1);
    }
  }
</style>
</head>

<body>

<div id="screen"></div>
<div id="wait">WAIT</div>

<script>
const screen = document.getElementById("screen");
const waitText = document.getElementById("wait");

const COLORS = {
  green: "#2dc937",
  yellow: "#e7b416",
  red: "#CC3232"
};

let current = "green";

// timing (ms)
const GREEN_TIME = 15000;
const YELLOW_TIME = 3000;
const RED_TIME = 15000;

function cycle() {
  // GREEN (solid)
  current = "green";
  screen.classList.remove("flash");
  screen.style.background = COLORS.green;

  setTimeout(() => {
    // YELLOW (flashing)
    current = "yellow";
    screen.style.background = COLORS.yellow;
    screen.classList.add("flash");

    setTimeout(() => {
      // RED (solid)
      current = "red";
      screen.classList.remove("flash");
      screen.style.background = COLORS.red;

      setTimeout(() => {
        cycle(); // loop
      }, RED_TIME);

    }, YELLOW_TIME);

  }, GREEN_TIME);
}

// click interaction
screen.addEventListener("click", () => {
  if (current === "red") {
    waitText.classList.remove("show");
    void waitText.offsetWidth;
    waitText.classList.add("show");
  }
});

// start immediately
cycle();

</script>

</body>
</html>
